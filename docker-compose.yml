version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tempnum
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=tempnum
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
